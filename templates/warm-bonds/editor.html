<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warm Bonds — Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
/* WARM BONDS THEME */

body{
margin:0;
font-family:"Poppins",sans-serif;
background:linear-gradient(135deg,#6B2C2C,#8C3A2F,#A44A3F);
padding:20px;
color:#F2D7B5;
}

.wrap{
max-width:1100px;
margin:auto;
background:#8C3A2F;
padding:26px;
border-radius:26px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
}

/* TITLES */

h1{
font-family:"Playfair Display",serif;
font-size:52px;
text-align:center;
margin-bottom:6px;
letter-spacing:2px;
color:#F2D7B5;
}

h2,h3{
text-align:center;
font-family:"Playfair Display",serif;
color:#E6C79C;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
}

/* CARD */

.card{
background:#B86A5B;
padding:16px;
border-radius:18px;
box-shadow:0 10px 24px rgba(0,0,0,.2);
border:2px solid #E6C79C;
}

.card img,
.card video,
.card audio{
width:100%;
border-radius:14px;
}

.msgText{
margin-bottom:8px;
font-family:"Playfair Display";
color:#F5E3C8;
}

/* INPUT */

input,textarea,select{
background:#C77C6C;
color:#F5E3C8;
border:1px solid #E6C79C;
padding:10px;
border-radius:12px;
}

/* BUTTONS */

.btn{
padding:10px 26px;
border-radius:999px;
border:none;
background:#D88F7C;
color:#5A2A2A;
font-weight:500;
cursor:pointer;
transition:.25s;
}

.btn:hover{
background:#C77C6C;
}

.ghost{
background:transparent;
color:#F2D7B5;
border:1px solid #E6C79C;
}

/* MEMORY MESSAGE */

.singleMessage{
background:#B86A5B;
padding:14px;
border-radius:16px;
margin-bottom:12px;
box-shadow:0 8px 20px rgba(0,0,0,.2);
border:1px solid #E6C79C;
}

.msgBtns{
display:flex;
justify-content:flex-end;
gap:8px;
margin-top:8px;
}

.msgBtns button{
border:none;
background:#D88F7C;
color:#5A2A2A;
padding:4px 12px;
border-radius:8px;
cursor:pointer;
}

/* MESSAGE BOX */

#allMessagesBox{
background:#C77C6C;
padding:18px;
border-radius:18px;
min-height:160px;
margin-top:14px;
white-space:pre-wrap;
font-family:"Playfair Display";
box-shadow:0 10px 24px rgba(0,0,0,.2);
color:#F5E3C8;
}

/* POPUP */

#msgPopup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
justify-content:center;
align-items:center;
z-index:9999;
}

.popupInner{
background:#B86A5B;
width:340px;
padding:24px;
border-radius:22px;
text-align:center;
font-family:"Playfair Display";
box-shadow:0 20px 40px rgba(0,0,0,.3);
color:#F5E3C8;
}

.site-footer{
  text-align:center;
  margin-top:40px;
  padding:16px;
  font-size:14px;
  color:#F2D7B5;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Warm Bonds</h1>
<h2>Celebrating the happiness we share.</h2>

<!-- MUSIC -->

<h2 style="margin-top:30px;">🎧 Background Music</h2>

<div class="card" style="text-align:center;">

<select id="bgMusicSelect" style="width:100%;padding:10px;border-radius:12px;">

<option value="">No Music</option>

 <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464726/ambient-home.mp3_b1bro0.mp3">
    Ambient Home ☁️
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464748/calm-peace.mp3_d9njbu.mp3">
    Calm & Peace 🌿
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464737/graceful-classic.mp3_z8doju.mp3">
    Graceful Classic 🎻
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464733/happy-family.mp3_ltzvhw.mp3">
    Happy Family 😊
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464736/hopeful-future.mp3_zmpadw.mp3">
    Hopeful Future 🌈
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464734/joyful-moments.mp3_mrt3yj.mp3">
    Joyful Moments ✨
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464735/nostalgia.mp3_kiqu6f.mp3">
    Nostalgia 🌙
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464746/parental-love.mp3_idv4fy.mp3">
    Parental Love 👨‍👩‍👧
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464752/togetherness.mp3_icrfo4.mp3">
    Togetherness 💞
  </option>

  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1767464745/warm-memories.mp3_dlvzch.mp3">
    Warm Memories 🤍
  </option>

</select>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;">

<button class="btn" onclick="playMusicPreview()">▶ Play</button>
<button class="btn ghost" onclick="stopMusicPreview()">⏸ Pause</button>
<button class="btn" onclick="saveBgMusic()">💾 Save Music</button>

<button class="btn" onclick="openWidget()">📸 Upload Media</button>

</div>

<p id="musicSavedMsg" style="display:none;margin-top:8px;">Music saved</p>

</div>

<h2 style="margin-top:24px;">📖 Memory Gallery</h2>

<div id="mediaGrid" class="grid"></div>

<div style="display:flex;gap:10px;margin-top:22px;">
<button class="btn ghost" onclick="clearAll()">Delete All</button>
<button class="btn" onclick="saveAll()">Save</button>
</div>

<h3 style="margin-top:32px;">🔐 Viewer Password</h3>

<input id="newPass" placeholder="warm">
<button class="btn" onclick="savePass()">Save</button>

<h3 style="margin-top:32px;">💭 Written Memories</h3>

<div style="display:flex;gap:10px;justify-content:center;">
<button id="msgOpenBtn" class="btn">Add Memory</button>
<button class="btn ghost" onclick="saveMessages()">💾 Save</button>
</div>

<div id="allMessagesBox"></div>

<div id="msgPopup">
<div class="popupInner">

<h3>Write Memory</h3>

<textarea id="msgInput" style="width:100%;height:120px;"></textarea>

<button id="msgSaveBtn" class="btn" style="margin-top:12px;">Save</button>

</div>
</div>

</div>

<script>

/* STORAGE KEYS */

const STORAGE_KEY="warm_gallery";
const MSG_KEY="warm_messages";
const MUSIC_KEY="warm_music";
const PASS_KEY="viewerPassword_warmbonds";

// load existing password when editor opens
window.addEventListener("DOMContentLoaded", () => {

const saved = localStorage.getItem(PASS_KEY);

if(saved){
newPass.value = saved;
}

});

/* LOAD DATA */

let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

/* SAVE */

function saveAll(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
}

/* DELETE */

function clearAll(){
items=[];
saveAll();
render();
}

/* RENDER */

function render(){

mediaGrid.innerHTML="";

items.forEach((o,i)=>{

const d=document.createElement("div");
d.className="card";

let el;

if(o.type==="video"){

el=document.createElement("video");
el.src=o.url;
el.controls=true;

}else{

el=document.createElement("img");
el.src=o.url;

}

const inp=document.createElement("input");
inp.placeholder="Caption...";
inp.value=o.caption || "";

inp.onchange=e=>{
o.caption=e.target.value;
saveAll();
};

const msg=document.createElement("textarea");
msg.value=o.message || "";

msg.onchange=e=>{
o.message=e.target.value;
saveAll();
};

const del=document.createElement("button");
del.textContent="Delete";
del.className="btn ghost";

del.onclick=()=>{
items.splice(i,1);
saveAll();
render();
};

d.append(el,inp,del);
mediaGrid.appendChild(d);

});

}

render();

/* CLOUDINARY UPLOAD */

function openWidget(type){
 cloudinary.openUploadWidget({
  cloudName:"di8n4lsjz",
  uploadPreset:"warm_bonds",
  folder:"warm_bonds",
  resourceType: "auto",
  multiple:true
 },(e,r)=>{
  if(!e && r && r.event==="success"){
    items.push({
      url:r.info.secure_url,
      type:r.info.resource_type,
      caption:""
    });
    render(); saveAll();
  }
 });
}

loadMessages();
/* MUSIC */

let previewAudio=null;

function playMusicPreview(){

let song=bgMusicSelect.value;

if(!song) return;

stopMusicPreview();

previewAudio=new Audio(song);

previewAudio.volume=.6;

previewAudio.play();

}

function stopMusicPreview(){

if(previewAudio){

previewAudio.pause();

previewAudio=null;

}

}

function saveBgMusic(){

localStorage.setItem(MUSIC_KEY,bgMusicSelect.value);

musicSavedMsg.style.display="block";

setTimeout(()=>musicSavedMsg.style.display="none",1500);

}

/* PASSWORD */

function savePass(){

const value=newPass.value.trim();

if(!value){

alert("Enter password");

return;

}

localStorage.setItem(PASS_KEY,value);

alert("Password saved");

}

/* MESSAGES */
function loadMessages(){

let txt = localStorage.getItem(MSG_KEY) || "";

allMessagesBox.innerHTML = "";

if(!txt.trim()){
allMessagesBox.innerText="(No memories yet)";
return;
}

let arr = txt.split(/\n---\n/);

arr.forEach((m,i)=>{

let d = document.createElement("div");
d.className = "singleMessage";

d.innerHTML = `
<div class="msgText">${m}</div>

<div class="msgBtns">
<button onclick="editMessage(${i})">Edit</button>
<button onclick="deleteMessage(${i})">Delete</button>
</div>
`;

allMessagesBox.appendChild(d);

});

}

function deleteMessage(i){

let txt = localStorage.getItem(MSG_KEY) || "";

let arr = txt.split(/\n---\n/);

arr.splice(i,1);

localStorage.setItem(MSG_KEY, arr.join("\n---\n"));

loadMessages();

}

function editMessage(i){

let txt = localStorage.getItem(MSG_KEY) || "";

let arr = txt.split(/\n---\n/);

let newMsg = prompt("Edit your memory:", arr[i]);

if(newMsg===null) return;

arr[i] = newMsg.trim();

localStorage.setItem(MSG_KEY, arr.join("\n---\n"));

loadMessages();

}

msgOpenBtn.onclick=()=>msgPopup.style.display="flex";

msgSaveBtn.onclick=()=>{

let m=msgInput.value.trim();

if(!m) return;

let old=localStorage.getItem(MSG_KEY)||"";

localStorage.setItem(MSG_KEY,old?old+"\n---\n"+m:m);

msgInput.value="";

msgPopup.style.display="none";

loadMessages();

};

msgPopup.onclick=e=>{
if(e.target===msgPopup) msgPopup.style.display="none";
};

function saveMessages(){

alert("Memories saved");

}

loadMessages();

</script>
<footer class="site-footer">
  <p>© 2026 CelebrateWithUs.web • Crafted with 💛</p>
</footer>
</body>
</html>
