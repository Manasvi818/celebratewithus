<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg,#fff6d8,#ffe4ec);
  transition: background 0.8s ease;
}

body.sunrise {
  background: linear-gradient(180deg,#fff6d8,#ffe7c7);
}
body.morning {
  background: linear-gradient(180deg,#fff3c4,#ffe1b3);
}
body.golden {
  background: linear-gradient(180deg,#ffd8b5,#ffcab0);
}
body.sunset {
  background: linear-gradient(180deg,#ffc6ec,#ffb3e6);
}

/* 🌟 Decorative line below title */
.title-line {
  width: 140px;
  height: 4px;
  margin: 14px auto 10px;
  border-radius: 999px;
  background: linear-gradient(
    90deg,
    transparent,
    #ffb703,
    #ff8fab,
    transparent
  );
  box-shadow: 0 0 10px rgba(255,183,120,0.6);
}

/* 🌈 Title line color sync with sky */

/* Sunrise */
body.sunrise .title-line {
  background: linear-gradient(
    90deg,
    transparent,
    #ffc857,
    #ffd166,
    transparent
  );
}

/* Morning */
body.morning .title-line {
  background: linear-gradient(
    90deg,
    transparent,
    #ffb703,
    #ffd166,
    transparent
  );
}

/* Golden */
body.golden .title-line {
  background: linear-gradient(
    90deg,
    transparent,
    #ff9f1c,
    #ffafcc,
    transparent
  );
}

/* Sunset */
body.sunset .title-line {
  background: linear-gradient(
    90deg,
    transparent,
    #ff8fab,
    #ffc6ff,
    transparent
  );
}

/* ===== PAGE WRAP ===== */
.page {
  max-width: 1100px;
  margin: auto;
  padding: 28px 18px 80px;
}

/* ===== HERO HEADER ===== */
header {
  background: linear-gradient(135deg,#fff1d8,#ffd9c6);
  border-radius: 40px;
  padding: 34px;
  text-align: center;
  box-shadow: 0 18px 40px rgba(0,0,0,.08);
  animation: headerGlow 3s ease-in-out infinite;
  transition: background 0.8s ease, box-shadow 0.8s ease;
}

header h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 56px;
  margin: 0;
  color: #6a4634;
  display: inline-block;
  white-space: nowrap;
  position: relative;
}
 /* 🌈 Title color sync with sky */

/* Sunrise */
body.sunrise #typingTitle {
  color: #6a4634; /* warm brown */
}

/* Morning */
body.morning #typingTitle {
  color: #8a5a2b; /* brighter golden brown */
}

/* Golden hour */
body.golden #typingTitle {
  color: #b45309; /* rich golden */
}

/* Sunset */
body.sunset #typingTitle {
  color: #9d174d; /* rosy sunset */
}

/* Smooth color transition */
#typingTitle {
  transition: color 0.8s ease;
}


@keyframes headerGlow {
  0%,100% { 
    box-shadow: 0 18px 40px rgba(0,0,0,.08); 
  }
  50% { 
    box-shadow: 0 22px 48px rgba(255,180,120,.25); 
  }
}

/* ✍️ Typing animation cursor */
#typingTitle::after {
 content: "│";
  margin-left: 6px;
  animation: blink 1s infinite;
  opacity: 0.6;
  position: relative;
  top: -4px;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ===== SECTION CARDS ===== */
section {
  background: rgba(255,255,255,0.35);
  border-radius: 28px;
  padding: 24px;
  margin-top: 26px;
  box-shadow: 0 14px 32px rgba(0,0,0,.08);
  transition: background 0.8s ease, box-shadow 0.8s ease;

  
}

/* ===== GALLERY ===== */
.polaroids {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 20px;
}

.polaroid {
  background: white;
  border-radius: 18px;
  padding: 14px;
  text-align: center;
  box-shadow: 0 12px 24px rgba(0,0,0,.12);
}

.polaroid-photo {
  width: 100%;
  border-radius: 14px;
}

.polaroid-caption {
  margin-top: 10px;
  font-size: 0.85rem;
  opacity: .8;
}

/* ===== BALLOONS ===== */
.balloons-card {
  background: linear-gradient(180deg,#ffe9c9,#ffd7a8);
}

.balloons-area {
  height: 180px;
  margin-top: 18px;
  border-radius: 22px;
  background: rgba(255,255,255,0.3);
}
/* 🎈 Balloon string */
.balloon::after {
  content: "";
  position: absolute;
  top: 85px;
  left: 50%;
  width: 2px;
  height: 40px;
  background: rgba(120, 90, 70, 0.5);
  transform: translateX(-50%);
  border-radius: 2px;
}


/* ===== TIMELINE ===== */
.timeline-card {
  background: linear-gradient(180deg,#fff2c4,#ffe0b3);
}

.timeline-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.timeline-header h2 {
  margin: 0;
}

.timeline-hint {
  font-size: .85rem;
  opacity: .7;
}

.timeline-cards {
  overflow-x: auto;
  padding-bottom: 10px;
}

.timeline-item {
  min-width: 160px;
  text-align: center;
  background: rgba(255,255,255,.6);
  border-radius: 18px;
  padding: 12px;
}

.timeline-item span {
  display: block;
  font-size: .75rem;
  opacity: .6;
}

/* ===== MESSAGES ===== */
.messages-card {
  background: linear-gradient(180deg,#ffe6b3,#ffd89e);
}

.message-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.message-card {
  background: #fff3bf;
  border-radius: 18px;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.message-text {
  font-size: .9rem;
  color: #6a4b2a;
}

  /* VIEWER PAGE REVEAL ANIMATION */
#viewerPage {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

#viewerPage.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🌿 Section entrance animation */
.section-animate {
  opacity: 0;
  transform: translateY(24px);
  animation: sectionIn 0.9s ease forwards;
}
 



@keyframes sectionIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
/* 🌼 Floating gallery cards */
.polaroid {
  transition: transform 0.35s ease, box-shadow 0.35s ease;
}

.polaroid:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 18px 36px rgba(0,0,0,.18);
}

/* 🌸 LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 99999;
}

.lightbox.open {
  opacity: 1;
  pointer-events: all;
}

.lightbox-inner {
  background: white;
  padding: 20px;
  border-radius: 22px;
  max-width: 80%;
  max-height: 80%;
  text-align: center;
  box-shadow: 0 30px 60px rgba(0,0,0,.35);
}

.lightbox-img {
  max-width: 100%;
  max-height: 55vh;
  border-radius: 16px;
}

.lightbox-caption {
  margin-top: 14px;
  font-size: 0.95rem;
  opacity: 0.8;
}

/* 🖼️ Polaroid reveal */
.polaroid {
  opacity: 0;
  animation: cardIn 0.8s ease forwards;
}

@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(30px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/*Balloon*/
/* ===== BALLOONS BASE ===== */
.balloons-area {
  position: relative;
  height: 220px;
  margin-top: 12px;
}

.balloon {
  position: absolute;
  width: 60px;
  height: 85px;
  border-radius: 50% 50% 45% 45%;
  background: pink;
}

.balloon[data-color="yellow"] { background: #ffe08a; }
.balloon[data-color="peach"]  { background: #ffccb3; }
.balloon[data-color="coral"]  { background: #ff9a9a; }

.balloon {
  animation:
    balloonFloat 4.5s ease-in-out infinite,
    balloonIn 0.4s ease;
}
@keyframes balloonIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.8);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
/* ☀️ Timeline sun glow + slide */
.timeline-sun {
  animation: sunGlow 2.5s ease-in-out infinite;
  transition: left 0.45s cubic-bezier(.4,0,.2,1),
              transform 0.3s ease;
}

@keyframes sunGlow {
  0%,100% {
    filter: drop-shadow(0 0 6px rgba(255,200,80,.6));
    transform: translate(-50%,-50%) scale(1);
  }
  50% {
    filter: drop-shadow(0 0 18px rgba(255,200,80,1));
    transform: translate(-50%,-50%) scale(1.1);
  }
}

/* ===== TIMELINE BASE ===== */
.timeline-track-wrap {
  margin: 12px 0;
}

.timeline-track {
  height: 6px;
  background: linear-gradient(90deg,#ffe08a,#ff9a9a);
  border-radius: 999px;
  position: relative;
}

.timeline-sun {
  position: absolute;
  top: 50%;
}

.timeline-cards {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

.timeline-item {
  background: #fff5e6;
  padding: 10px;
  border-radius: 14px;
  cursor: pointer;
  opacity: .6;
}

.timeline-item.active {
  opacity: 1;
  box-shadow: 0 6px 14px rgba(0,0,0,.15);
}

/* 🌈 Timeline cards color sync with sky */

/* Sunrise */
body.sunrise .timeline-item {
  background: #fff1d6;
}

/* Morning */
body.morning .timeline-item {
  background: #ffefc2;
}

/* Golden */
body.golden .timeline-item {
  background: #ffe0c6;
}

/* Sunset */
body.sunset .timeline-item {
  background: #ffd6ec;
}

/*Lightbox*/
.lightbox-inner {
  animation: zoomIn 0.25s ease forwards;
}

@keyframes zoomIn {
  from { transform: scale(.85); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* 💌 Message appear animation */
.message-card {
  opacity: 0;
  animation: msgIn 0.5s ease forwards;
}

@keyframes msgIn {
  from {
    opacity: 0;
    transform: translateY(14px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
/* 🌈 Section color sync with sky */

/* Sunrise */
body.sunrise section,
body.sunrise header {
  background: linear-gradient(135deg,#fff6dd,#ffe8c9);
}

/* Morning */
body.morning section,
body.morning header {
  background: linear-gradient(135deg,#fff4c8,#ffe6ad);
}

/* Golden hour */
body.golden section,
body.golden header {
  background: linear-gradient(135deg,#ffe1c6,#ffd0b5);
}

/* Sunset */
body.sunset section,
body.sunset header {
  background: linear-gradient(135deg,#ffd6ec,#ffc2e3);
}

/* 🌸 Floating background emojis */
.bg-emoji {
  position: fixed;
  font-size: 20px;
  opacity: 0.25;
  animation: floatEmoji linear infinite;
  pointer-events: none;
  z-index: 1;
}

@keyframes floatEmoji {
  from {
    transform: translateY(100vh) scale(0.8);
    opacity: 0;
  }
  20% { opacity: 0.25; }
  to {
    transform: translateY(-120px) scale(1.2);
    opacity: 0;
  }
}

/* 🌈 Cursor emoji trail */
.emoji-trail {
  position: fixed;
  pointer-events: none;
  font-size: 18px;
  animation: trailFade 1s ease forwards;
  z-index: 99999;
}

@keyframes trailFade {
  from {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  to {
    opacity: 0;
    transform: scale(0.6) translateY(-20px);
  }
}

.videoBox{
  width:100%;
  margin-bottom:25px;
}

.videoBox video{
  width:100%;
  aspect-ratio:16/9;
  border-radius:18px;
  object-fit:cover;
}

.videoCaption{
  text-align:center;
  margin-top:8px;
  font-size:14px;
  opacity:.8;
}

.site-footer{
  text-align:center;
  margin-top:40px;
  padding:18px;
  font-size:14px;
  color:#6b4b00;
  font-family:"Poppins";
}
</style>
</head>

<!-- 🔐 PASSWORD + MUSIC LOGIC -->
<!-- ============================= -->
<script>
const PASS_KEY  = "viewerPassword_sunnySmiles";
const MUSIC_KEY = "ss_bg_music";

let isPlaying = false;

function checkPassword(){
  const savedPassword = localStorage.getItem(PASS_KEY);
  const entered = document.getElementById("passInput").value.trim();

  if (!savedPassword) {
    alert("Password not set yet. Please set it from editor ❗");
    return;
  }

  if (entered !== savedPassword) {
    alert("Wrong password ❌");
    return;
  }

  // ✅ UNLOCK
  document.getElementById("lockScreen").style.display = "none";
 const viewer = document.getElementById("viewerPage");
viewer.style.display = "block";
requestAnimationFrame(() => viewer.classList.add("show"));


  // 🎵 LOAD SAVED MUSIC
  const musicUrl = localStorage.getItem(MUSIC_KEY);
  const audio = document.getElementById("bgMusic");
  const btn   = document.getElementById("musicToggle");

  if (musicUrl && audio) {
    audio.src = musicUrl;
    audio.volume = 0.6;

    audio.play().then(() => {
      isPlaying = true;
      btn.textContent = "⏸";
    }).catch(() => {
      btn.textContent = "▶️"; // autoplay blocked
    });
  }
}

// 🎵 PLAY / PAUSE BUTTON
document.getElementById("musicToggle").addEventListener("click", () => {
  const audio = document.getElementById("bgMusic");
  if (!audio || !audio.src) return;

  if (isPlaying) {
    audio.pause();
    musicToggle.textContent = "▶️";
  } else {
    audio.play();
    musicToggle.textContent = "⏸";
  }
  isPlaying = !isPlaying;
});
</script>
<script>
  /* ✨ Typing animation */
const titleText = "Sunny Smiles";
const titleEl = document.getElementById("typingTitle");
let tIndex = 0;

function typeTitle(){
  if(tIndex < titleText.length){
    titleEl.textContent += titleText.charAt(tIndex);
    tIndex++;
    setTimeout(typeTitle, 120);
  }
}

/* Start typing after unlock */
const oldInit = initViewerFeatures;
initViewerFeatures = function(){
  oldInit();
  titleEl.textContent = "";
  tIndex = 0;
  setTimeout(typeTitle, 400);
};

/* ============================= */
/* 🌼 GALLERY (FROM EDITOR) */
/* ============================= */
const MEDIA_KEY = "ss_media_v1";
const MSG_KEY   = "ss_messages";

const gallerySection = document.getElementById("gallerySection");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const lightboxCaption = document.getElementById("lightboxCaption");

function loadGallery(){
  const items = JSON.parse(localStorage.getItem("ss_media_v1") || "[]");

  const videoContainer = document.getElementById("videoContainer");
  const gallerySection = document.getElementById("gallerySection");

  videoContainer.innerHTML = "";
  gallerySection.innerHTML = "";

  if(!items.length){
    gallerySection.innerHTML = "<p style='opacity:.7'>No memories added yet 💭</p>";
    return;
  }

  // ✅ VIDEOS (FULL WIDTH)
  items.forEach(item=>{
  if(!item || !item.url || !item.type) return;  // ✅ ADD THIS LINE

  if(item.type === "video"){
      videoContainer.innerHTML += `
        <div class="videoBox">
          <video src="${item.url}" controls></video>
          <p class="videoCaption">${item.caption || ""}</p>
        </div>
      `;
    }
  });

  if(item.type === "audio"){
  videoContainer.innerHTML += `
    <div class="videoBox">
      <audio src="${item.url}" controls></audio>
      <p class="videoCaption">${item.caption || ""}</p>
    </div>
  `;
}

  // ✅ IMAGES (2 PER ROW)
  const wrap = document.createElement("div");
  wrap.className = "polaroids";

  items.forEach((item,index)=>{
  if(!item || !item.url || !item.type) return;
    if(item.type === "image"){
      const card = document.createElement("div");
      card.className = "polaroid";

      card.innerHTML = `
        <img src="${item.url}" class="polaroid-photo">
        <div class="polaroid-caption">${item.caption || ""}</div>
      `;

      card.onclick = ()=>{
        lightbox.classList.add("open");
        lightboxImg.src=item.url;
        lightboxCaption.textContent=item.caption||"";
      };

      wrap.appendChild(card);
    }
  });

  gallerySection.appendChild(wrap);
}

lightbox.onclick = () => lightbox.classList.remove("open");

/* ============================= */
/* 🎈 FLOATING JOY BALLOONS */
/* ============================= */
const balloonsArea = document.getElementById("balloonsArea");
const balloonColors = ["yellow","peach","coral"];

function spawnBalloons(){
  balloonsArea.innerHTML = "";

  const count = 7;
  const gap = 100 / (count + 1);

  for(let i = 0; i < count; i++){
    const b = document.createElement("div");
    b.className = "balloon";
    b.dataset.color = balloonColors[i % balloonColors.length];

    b.style.left = `${gap * (i + 1)}%`;
    b.style.bottom = "20px";
    b.style.animationDelay = `${i * 0.2}s`;

    b.onclick = (e)=>{
      e.stopPropagation();
      popBalloon(b);
    };

    balloonsArea.appendChild(b);
  }
}


function popBalloon(balloon){
  // sparkle effect
  for(let i=0;i<6;i++){
    const p = document.createElement("span");
    p.className = "balloon-particle";
    p.textContent = "✨";
    p.style.setProperty("--tx",`${Math.random()*60-30}px`);
    p.style.setProperty("--ty",`${Math.random()*-60}px`);
    balloon.appendChild(p);
  }

  balloon.remove();

  // 🎈 if all balloons are gone → respawn
  if (balloonsArea.children.length === 0) {
    setTimeout(() => {
      spawnBalloons();
    }, 600);
  }
}


/* ============================= */
/* ☀️ SUNNY STORY TIMELINE */
/* ============================= */
const timelineSection = document.getElementById("timelineSection");

const stages = [
  {label:"Sunrise Soft Wake-up", time:"8:00 AM", body:"sunrise", pos:"5%"},
  {label:"Bright Morning Moments", time:"11:00 AM", body:"morning", pos:"35%"},
  {label:"Golden Hour Glow",  time:"4:00 PM", body:"golden",  pos:"65%"},
  {label:"Cozy Sunset Wind-down",  time:"8:30 PM", body:"sunset", pos:"95%" }
];

function buildTimeline(){
  timelineSection.innerHTML = `
    <div class="timeline-header">
      <h2>☀️ Sunny Story Timeline</h2>
      <div class="timeline-hint">Tap a moment to change the sky</div>
    </div>

    <div class="timeline-track-wrap">
      <div class="timeline-track">
        <div class="timeline-sun" id="timelineSun">☀️</div>
      </div>
    </div>

    <div class="timeline-cards">
      ${stages.map((s,i)=>`
        <div class="timeline-item ${i===0?"active":""}" data-i="${i}">
          <span>${s.time}</span>
          <strong>${s.label}</strong>
        </div>
      `).join("")}
    </div>
  `;

  const sun = document.getElementById("timelineSun");
  sun.style.left = stages[0].pos;
  document.querySelectorAll(".timeline-item").forEach(item=>{
    item.onclick = ()=>{
      document.querySelectorAll(".timeline-item").forEach(i=>i.classList.remove("active"));
      item.classList.add("active");

      const stage = stages[item.dataset.i];
      sun.style.left = stage.pos;
      document.body.classList.remove("sunrise","morning","golden","sunset");
document.body.classList.add(stage.body);
    };
  });
}

/* 💌 SUNNY MESSAGES */
/* ============================= */
const viewerMessages = document.getElementById("viewerMessages");

function loadMessages(){
  const raw = localStorage.getItem(MSG_KEY);
  if(!raw){
    viewerMessages.innerHTML = "<p class='message-empty'>No messages yet 💛</p>";
    return;
  }

  const msgs = raw.split("\n---\n");
  const list = document.createElement("div");
  list.className = "message-list";

  msgs.forEach((m, index) => {
  const card = document.createElement("div");
  card.className = "message-card";
  card.style.animationDelay = `${index * 0.1}s`;
  card.innerHTML = `<div class="message-text">${m}</div>`;
  list.appendChild(card);
});

  viewerMessages.appendChild(list);
}

/* ============================= */
/* 🚀 INIT AFTER UNLOCK */
/* ============================= */
function initViewerFeatures(){
  document.querySelectorAll(".section-animate").forEach((el,i)=>{
  el.style.animation = "none";
    el.offsetHeight; // force reflow
    el.style.animation = "";
    el.style.animationDelay = `${i * 0.15}s`;
});

  loadGallery();
  spawnBalloons();
  buildTimeline();
  loadMessages();

  // ⏳ wait for DOM paint
  requestAnimationFrame(() => {
    document.querySelectorAll(".section-animate").forEach(el => {
      el.style.animation = "none";
      el.offsetHeight;
      el.style.animation = "";
    });
  });
}


/* Hook into unlock */
const _oldCheck = checkPassword;
checkPassword = function(){
  _oldCheck();
  if(document.getElementById("viewerPage").style.display === "block"){
    initViewerFeatures();
    
  }
};
/* 😊 Cursor Emoji Trail */
(function emojiTrail() {
  const emojis = ["😊", "🌼", "💛", "✨"];
  let index = 0;

  document.addEventListener("mousemove", (e) => {
    const span = document.createElement("span");
    span.className = "emoji-trail";
    span.textContent = emojis[index % emojis.length];
    index++;

    span.style.left = e.clientX + "px";
    span.style.top = e.clientY + "px";

    document.body.appendChild(span);

    setTimeout(() => span.remove(), 1000);
  });
})();


/* 🌼 Continuous Background Emoji Animation */
(function floatingEmojiBackground() {
  const emojis = ["😊", "🌼", "💛", "✨"];

  setInterval(() => {
    const emoji = document.createElement("div");
    emoji.className = "bg-emoji";
    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];

    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.animationDuration = 6 + Math.random() * 6 + "s";

    document.body.appendChild(emoji);

    setTimeout(() => emoji.remove(), 12000);
  }, 700);
})();
