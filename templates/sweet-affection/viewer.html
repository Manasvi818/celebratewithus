<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg-main:#F6E3C9;
  --peach:#F3C6A8;
  --heart:#E77A73;
  --text-main:#B94E4B;
  --card:#FFF6EF;
  --beige:#EAD2B8;
  --accent:#8C4A3C;
}

*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  background:linear-gradient(135deg,var(--bg-main),var(--peach));
  color:var(--text-main);
  overflow-x:hidden;
}

.dot-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;

background-image:
radial-gradient(circle, rgba(231,122,115,0.25) 5px, transparent 6px);

background-size:120px 120px;
}
/* HERO */

.hero{
padding:30px 20px 40px;
text-align:center;
margin-top:-20px;
}

.title{
font-family:'Allura',cursive;
font-size:8rem;
margin-bottom:0;
line-height:1;
color:var(--text-main);
}

.subtitle{
font-family:'Libre Baskerville',serif;
letter-spacing:4px;
font-size:16px;
margin-top:8px;
opacity:.8;
text-transform:uppercase;
}

/* GALLERY */

.gallery{
max-width:1150px;
margin:auto;
padding:10px 20px 30px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:32px;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}

.card{
background:var(--card);
border-radius:26px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.1);
transition:.4s;
}

.card:hover{
transform:translateY(-8px);
}

.card img,
.card video{
width:100%;
height:280px;
object-fit:cover;
}

.caption{
padding:18px;
text-align:center;
font-style:italic;
color:var(--text-main);
}

/* MESSAGE BOX */

.message-box{
margin:70px 0;
text-align:center;
}

.pink-msg-box{
width:min(92%,950px);
margin:auto;
padding:50px;
border-radius:32px;
background:linear-gradient(145deg,var(--card),var(--beige));
box-shadow:0 20px 60px rgba(0,0,0,.12);
font-size:18px;
line-height:1.8;
}

/* CONTROLS */

.controlBox{
background:var(--accent);
color:white;
padding:12px 22px;
border-radius:40px;
cursor:pointer;
transition:.3s;
}

.controlBox:hover{
transform:scale(1.1);
}

#topControls{
position:fixed;
top:20px;
right:25px;
display:flex;
gap:14px;
flex-direction:column;
z-index:9999;
}

/* PASSWORD SCREEN */

#lockScreen{
position:fixed;
inset:0;
background:linear-gradient(135deg,var(--bg-main),var(--peach));
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
}

.passCard{
padding:30px;
border-radius:22px;
text-align:center;
background:linear-gradient(145deg,var(--card),var(--beige));
color:var(--text-main);
box-shadow:0 25px 70px rgba(0,0,0,.15);
width:420px;
max-width:90%;
}

.passCard h3{
font-family:'Allura',cursive;
font-size:2.8rem;
margin-bottom:10px;
}

.passCard input{
width:100%;
padding:10px;
border-radius:20px;
border:1px solid var(--beige);
margin-top:10px;
}

.passCard button{
margin-top:16px;
padding:10px 22px;
border-radius:30px;
border:none;
background:var(--accent);
color:white;
cursor:pointer;
}

/* FLOATING HEARTS */

.floating-heart{
position:fixed;
bottom:-30px;
font-size:22px;
pointer-events:none;
animation:heartFloat 8s linear forwards;
}

@keyframes heartFloat{
from{transform:translateY(0);opacity:0;}
10%{opacity:1;}
to{transform:translateY(-120vh);opacity:0;}
}

.msg-title{
text-align:center;
font-family:'Allura',cursive;
font-size:3rem;
margin-bottom:25px;
}

.videoBox{
  width:100%;
  margin-bottom:30px;
}

.videoBox video{
  width:100%;
  aspect-ratio:16/9;
  border-radius:20px;
  object-fit:cover;
}

.site-footer{
  text-align:center;
  margin-top:40px;
  padding:18px;
  font-size:14px;
  color:#B94E4B;
}
</style>
</head>

<body>
<div class="dot-bg"></div>
<section class="hero">
<h1 class="title">Sweet Affection</h1>
<h2 class="subtitle">You are my everything</h2>
</section>

<div id="lockScreen">

<div class="passCard">

<h3>Private Sweet Affection</h3>

<input id="passInput" type="password" placeholder="Enter password">

<button onclick="checkPassword()">Enter</button>

<p id="wrongPass" style="display:none;color:#ff7b7b;">
Wrong password
</p>

</div>
</div>

<section class="gallery">

<h2 class="msg-title">Our Lovely Moments</h2>

<div id="videoContainer"></div>
<div class="grid" id="imageGrid"></div>

</section>

<section class="message-box">

<h2 class="msg-title">A message for you</h2>

<div id="viewerMessage" class="pink-msg-box">
A quiet feeling rests here ❤️
</div>

</section>

<div id="topControls">

<div class="controlBox" id="musicToggle">
🎶 Music
</div>

<div class="controlBox" id="sparkleToggle">
💖 Hearts
</div>

</div>

<script>

const STORAGE_KEY = "sweet_gallery";
const MSG_KEY = "sweet_messages";

/* PASSWORD */

const savedPass = localStorage.getItem("viewerPassword_sweet");

function checkPassword(){

const input=document.getElementById("passInput").value;

if(!savedPass || savedPass===""){
document.getElementById("lockScreen").style.display="none";
return;
}

if(input===savedPass){

document.getElementById("lockScreen").style.display="none";

/* autoplay music after unlock */
setTimeout(startMusic,300);
loadGallery();
}
else{
document.getElementById("wrongPass").style.display="block";
}

}

function loadGallery(){

  const items = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  const videoContainer = document.getElementById("videoContainer");
  const imageGrid = document.getElementById("imageGrid");

  videoContainer.innerHTML = "";
  imageGrid.innerHTML = "";

  if(!items.length){
    imageGrid.innerHTML = "<p>No memories yet ❤️</p>";
    return;
  }

  // 🎥 VIDEOS (FULL ROW)
  items.forEach(item=>{
    if(item.type === "video"){
      videoContainer.innerHTML += `
        <div class="videoBox">
          <video src="${item.url}" controls></video>
          <div class="caption">${item.caption || ""}</div>
        </div>
      `;
    }
  });

  // 🖼 IMAGES (2 PER ROW)
  items.forEach(item=>{
    if(item.type !== "video"){
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${item.url}">
        <div class="caption">${item.caption || ""}</div>
      `;

      imageGrid.appendChild(card);
    }
  });

}
/* MUSIC */

const savedMusic = localStorage.getItem("sweet_music");

let bgAudio=null;
let playing=false;

const musicToggle=document.getElementById("musicToggle");

function startMusic(){

if(!savedMusic) return;

if(!bgAudio){
bgAudio = new Audio(savedMusic);
bgAudio.loop = true;
bgAudio.volume = 0.6;
}

bgAudio.play().catch(()=>{});
playing = true;
musicToggle.innerText = "⏸ Music";

}

musicToggle.onclick=()=>{

if(!savedMusic){
musicToggle.innerText="No Music";
return;
}

if(!bgAudio){
bgAudio=new Audio(savedMusic);
bgAudio.loop=true;
bgAudio.volume=0.6;
}

if(playing){
bgAudio.pause();
playing=false;
musicToggle.innerText="🎶 Music";
}
else{
bgAudio.play();
playing=true;
musicToggle.innerText="⏸ Music";
}

};

/* 💖 HEART TOGGLE */

let heartsOn = true;
let heartInterval;

const heartBtn = document.getElementById("sparkleToggle");

function startHearts(){
heartInterval = setInterval(()=>{
const heart=document.createElement("div");
heart.className="floating-heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
},900);
}

function stopHearts(){
clearInterval(heartInterval);
}

heartBtn.onclick=()=>{

heartsOn = !heartsOn;

if(heartsOn){
heartBtn.innerText="💖 Hearts ON";
startHearts();
}
else{
heartBtn.innerText="💖 Hearts OFF";
stopHearts();
}

};

/* start hearts by default */
startHearts();

/* LOAD GALLERY */

const grid=document.querySelector(".grid");
const viewerMessage=document.getElementById("viewerMessage");

const items=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
const messages=JSON.parse(localStorage.getItem(MSG_KEY)||"[]");

if(Array.isArray(messages) && messages.length>0){
  viewerMessage.innerHTML = messages
    .filter(m => m && m.trim())
    .map(m => `💌 ${m}`)
    .join("<br><br>");
}





</script>
<footer class="site-footer">
  <p>© 2026 CelebrateWithUs.web • Crafted with 💛</p>
</footer>
</body>
</html>
