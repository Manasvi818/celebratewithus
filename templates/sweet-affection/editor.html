<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sweet Affection — Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Libre+Baskerville:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>

:root{
  --bg:#F6E3C9;
  --peach:#F3C6A8;
  --heart:#E77A73;
  --text:#B94E4B;
  --card:#FFF6EF;
  --beige:#EAD2B8;
  --accent:#8C4A3C;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,var(--bg),var(--peach));
  color:var(--text);
  padding:30px;
}

.dot-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;

background-image:
radial-gradient(circle, rgba(231,122,115,0.25) 5px, transparent 6px);

background-size:120px 120px;
}

/* floating hearts background */

.wrap{
max-width:1100px;
margin:auto;
background:linear-gradient(145deg,var(--card),var(--beige));
padding:40px;
border-radius:32px;
box-shadow:0 25px 70px rgba(0,0,0,.12);
}

h1{
font-family:'Allura',cursive;
font-size:5rem;
text-align:center;
color:var(--text);
margin-bottom:10px;
}

h2,h3{
text-align:center;
font-family:'Libre Baskerville',serif;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:18px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.card img,
.card video{
width:100%;
border-radius:18px;
}

input, textarea, select{
width:100%;
margin-top:10px;
padding:10px;
border-radius:14px;
border:1px solid var(--beige);
background:white;
color:var(--text);
}

.btn{
padding:10px 22px;
border-radius:40px;
border:none;
background:var(--accent);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
background:#6e3a2f;
}

.ghost{
background:transparent;
border:1px solid var(--accent);
color:var(--accent);
}


/* MESSAGE POPUP */

#msgPopup{
position:fixed;
inset:0;
background:rgba(255,246,239,.9);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
}

.popupInner{
width:min(92%,500px);
background:linear-gradient(145deg,var(--card),var(--beige));
padding:30px;
border-radius:28px;
box-shadow:0 25px 70px rgba(0,0,0,.18);
text-align:center;
}

.site-footer{
  text-align:center;
  margin-top:40px;
  padding:18px;
  font-size:14px;
  color:#B94E4B;
}
</style>
</head>

<body>
<div class="dot-bg"></div>
<div class="wrap">

<h1>Sweet Affection</h1>
<h2>Create your love story ❤️</h2>

<!-- MUSIC -->
<h2 style="margin-top:30px;">🎶 Background Music</h2>

<div class="card">
<select id="bgMusicSelect">
<option value="">No Music</option>
<option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024745/Pink_Silence_cpqqba.mp3">Pink Silence💞</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024741/Lights_cfhsxj.mp3">Lights🌸</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024740/One_Love_pq1obq.mp3">One Love💕</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024734/Velvet_Moments_kkpzlk.mp3">Velvet Moments🤍</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024733/Falling_Slowly_czfydq.mp3">Falling Slowly💞</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024730/Sweet_psqzg1.mp3">Sweet🌸</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024729/sweetvibe_lnfwkn.mp3">Sweet vibe💕</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024725/Heart_in_Bloom_fgj5oc.mp3">Heart in Bloom🤍</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024722/Whisper_of_You_wpcufk.mp3">Whisper of You💕</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1769024718/Spring_Flowers_xjmnsd.mp3">Spring Flowers🤍</option>
</select>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">

<button class="btn ghost" onclick="previewMusic()">▶️ Preview</button>

<button class="btn ghost" onclick="stopMusic()">⏹ Stop</button>

<button class="btn" onclick="saveMusic()">Save Music</button>

<button class="btn ghost" onclick="openWidget('image')">📷 Image</button>

<button class="btn ghost" onclick="openWidget('video')">🎥 Video</button>

<label class="btn ghost">
Local Upload
<input type="file" hidden accept="image/*,video/*" onchange="uploadLocal(event)">
</label>

</div>
</div>

<!-- GALLERY -->
<h2 style="margin-top:30px;">💕 Love Gallery</h2>
<div id="mediaGrid" class="grid"></div>

<div style="margin-top:20px;display:flex;gap:10px;">
<button class="btn ghost" onclick="clearAll()">Delete All</button>
<button class="btn" onclick="autoSave()">Save</button>
</div>

<!-- PASSWORD -->
<h3 style="margin-top:30px;">🔐 Viewer Password</h3>
<input id="newPass" placeholder="sweet">
<button class="btn" onclick="savePass()">Save Password</button>

<!-- MESSAGES -->
<h3 style="margin-top:30px;">💌 Sweet Messages</h3>

<div style="text-align:center;">
<button class="btn" id="msgOpenBtn">Add Message</button>
</div>

<div id="messagesContainer" style="margin-top:20px;"></div>

</div>


<!-- MESSAGE POPUP -->

<div id="msgPopup">
<div class="popupInner">

<h3>Write something sweet ❤️</h3>

<textarea id="msgInput" style="height:120px;"></textarea>

<button class="btn" id="msgSaveBtn" style="margin-top:12px;">Save</button>

</div>
</div>


<script>

/* SAME SCRIPT AS YOUR ORIGINAL */

const STORAGE_KEY="sweet_gallery";
const MSG_KEY="sweet_messages";
const MUSIC_KEY="sweet_music";

let items=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");

function autoSave(){
  localStorage.setItem("sweet_gallery", JSON.stringify(items));
}

function saveAll(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
}

function clearAll(){
items=[];
autoSave();
render();
}

function render(){
mediaGrid.innerHTML="";
items.forEach((o,i)=>{
if(!o || !o.url) return;
let d=document.createElement("div");
d.className="card";

let isVideo = o.type === "video" || (o.type || "").includes("video");

let el = isVideo
?Object.assign(document.createElement("video"),{src:o.url,controls:true})
:Object.assign(document.createElement("img"),{src:o.url});

let cap=document.createElement("input");
cap.placeholder="Caption...";
cap.value=o.caption||"";
cap.oninput=e=>{o.caption=e.target.value;autoSave();};

let mem=document.createElement("textarea");
mem.placeholder="Memory...";
mem.style.height="80px";
mem.value=o.memory||"";
mem.oninput=e=>{o.memory=e.target.value;autoSave();};

let del=document.createElement("button");
del.textContent="Delete";
del.className="btn ghost";
del.style.marginTop="10px";
del.onclick=()=>{items.splice(i,1);autoSave();render();};

d.append(el,cap,mem,del);
mediaGrid.appendChild(d);
});

}

function uploadLocal(e){

let f=e.target.files[0];
if(!f)return;

let r=new FileReader();

r.onload=x=>{
items.push({
url:x.target.result,
type:f.type.includes("video")?"video":"image",
caption:"",
memory:""
});
autoSave();
render();

};

r.readAsDataURL(f);

}

function openWidget(type){

cloudinary.openUploadWidget({

cloudName:"di8n4lsjz",
uploadPreset:"sweet_affection",
folder:"sweet_affection",
resourceType:type,
multiple:true

},(error,result)=>{

if(!error && result && result.event==="success"){

items.push({
url:result.info.secure_url,
type: result.info.resource_type === "video" ? "video" : "image",
caption:"",
memory:""
});
autoSave();
render();

}

});

}

function savePass(){
localStorage.setItem("viewerPassword_sweet",newPass.value);
alert("Password saved ❤️");
}

function saveMusic(){
localStorage.setItem(MUSIC_KEY,bgMusicSelect.value||"");
alert("Music saved 🎶");
}

let previewAudio = null;

function previewMusic(){

const selected = document.getElementById("bgMusicSelect").value;

if(!selected){
alert("Select a music first ❤️");
return;
}

if(previewAudio){
previewAudio.pause();
previewAudio.currentTime = 0;
}

previewAudio = new Audio(selected);
previewAudio.volume = 0.6;
previewAudio.play();

}

function stopMusic(){

if(previewAudio){
previewAudio.pause();
previewAudio.currentTime = 0;
}

}

/* MESSAGE SYSTEM */

let messages = JSON.parse(localStorage.getItem(MSG_KEY) || "[]");

const msgOpenBtn = document.getElementById("msgOpenBtn");
const msgPopup = document.getElementById("msgPopup");
const msgInput = document.getElementById("msgInput");
const msgSaveBtn = document.getElementById("msgSaveBtn");
const messagesContainer = document.getElementById("messagesContainer");

function renderMessages(){

messagesContainer.innerHTML="";

if(messages.length===0){
messagesContainer.innerHTML="<p style='text-align:center;opacity:.6;'>No messages yet ❤️</p>";
return;
}

messages.forEach((text,index)=>{

const box=document.createElement("div");

box.style.cssText=`
background:white;
padding:16px;
border-radius:18px;
margin-bottom:12px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
font-family:'Libre Baskerville';
`;

const msgText=document.createElement("div");
msgText.innerText=text;

const btnWrap=document.createElement("div");
btnWrap.style.cssText="margin-top:10px;display:flex;gap:8px;justify-content:flex-end;";

const editBtn=document.createElement("button");
editBtn.textContent="Edit";
editBtn.className="btn ghost";

editBtn.onclick=()=>{
msgInput.value=text;
msgPopup.style.display="flex";
messages.splice(index,1);
localStorage.setItem(MSG_KEY,JSON.stringify(messages));
renderMessages();

};

const delBtn=document.createElement("button");
delBtn.textContent="Delete";
delBtn.className="btn ghost";

delBtn.onclick=()=>{
messages.splice(index,1);
localStorage.setItem(MSG_KEY,JSON.stringify(messages));
renderMessages();
};

btnWrap.append(editBtn,delBtn);

box.append(msgText,btnWrap);

messagesContainer.appendChild(box);

});

}

msgOpenBtn.onclick=()=>{
msgInput.value="";
msgPopup.style.display="flex";
};

msgSaveBtn.onclick=()=>{

const text=msgInput.value.trim();
if(!text)return;

messages.push(text);

localStorage.setItem(MSG_KEY,JSON.stringify(messages));

msgPopup.style.display="none";

renderMessages();
render();  
};

msgPopup.onclick=(e)=>{
if(e.target===msgPopup){
msgPopup.style.display="none";
}
};

renderMessages();
render();  
</script>
<footer class="site-footer">
  <p>© 2026 CelebrateWithUs.web • Crafted with 💛</p>
</footer>
</body>
</html>
