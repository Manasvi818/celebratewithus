<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simple Delight — Editor • CelebrateWithUs</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
:root{

  /* Background */
  --bg-main:#F6F1E6;
  --bg-card:#EFE7D8;
  --bg-panel:#E6DCCB;

  /* Text */
  --text:#5a3e2b;

  /* Main Accent */
  --accent:#F08A3C;
  --accent2:#F5A65B;
  --deep:#E8742B;

  /* Photo frame */
  --frame:#FFFFFF;
  --frame-border:#E5DDCF;
  --frame-shadow:#D9D2C4;

  /* Confetti colors */
  --confetti-red:#E55B3C;
  --confetti-yellow:#F4C542;
  --confetti-blue:#6FB6C8;
  --confetti-mint:#7DB6A4;
  --confetti-peach:#F2A07C;

  --shadow:0 14px 35px rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:"Quicksand", sans-serif;
  background:#F6F1E6;
  padding:20px;
  color:var(--text);
  overflow-x:hidden;
}

/* Soft sunshine glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,159,28,.25), transparent 60%),
    radial-gradient(circle at 80% 30%, rgba(255,191,105,.25), transparent 60%),
    radial-gradient(circle at 50% 85%, rgba(231,111,81,.15), transparent 60%);
  z-index:-1;
}

.wrap{
  max-width:1100px;
  margin:auto;
  background:var(--bg-card);
  padding:22px;
  border-radius:24px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}

h1{
  font-family:"Baloo 2", cursive;
  font-size:50px;
  text-align:center;
  margin-bottom:6px;
  color:var(--deep);
}

.subText{
  text-align:center;
  font-size:17px;
  margin-top:-5px;
  opacity:.9;
}

h2, h3{
  text-align:center;
  margin-top:24px;
}

.btn{
  padding:10px 18px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.2s ease;
}
.btn:hover{ transform:scale(1.05); }

.ghost{
  background:white;
  color:var(--text);
  border:1px solid var(--accent2);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.card{
  background:var(--frame);
  padding:12px;
  border-radius:18px;
  border:2px solid var(--frame-border);
  box-shadow:0 6px 14px var(--frame-shadow);
}

.card img, .card video{
  width:100%;
  border-radius:14px;
}

.card input{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ffd6a5;
  outline:none;
  font-family:"Quicksand";
}

/* Messages */
#allMessagesBox{
  background:rgba(255,255,255,.8);
  padding:14px;
  border-radius:18px;
  min-height:160px;
  margin-top:12px;
  white-space:pre-wrap;
}

.singleMessage{
  background:#fff0d6;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
}

.msgBtns{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:8px;
}

.msgBtns button{
  border:none;
  background:var(--accent);
  color:white;
  padding:5px 10px;
  border-radius:10px;
  cursor:pointer;
}

/* Popup */
#msgPopup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  justify-content:center;
  align-items:center;
}

.popupInner{
  background:white;
  width:320px;
  padding:18px;
  border-radius:18px;
  text-align:center;
}

.popupInner textarea{
  width:100%;
  height:120px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ffd6a5;
  font-family:"Quicksand";
}

select{
  padding:10px;
  width:100%;
  border-radius:14px;
  border:1px solid #ffd6a5;
}

.smallOk{
  display:none;
  color:green;
  margin-top:8px;
  font-weight:700;
  text-align:center;
}

.site-footer{
  text-align:center;
  margin-top:40px;
  padding:18px;
  font-size:14px;
  color:#5a3e2b;
}
</style>
</head>

<body>
<div class="wrap">

<h1>Simple Delight</h1>
<p class="subText"></p>

<!-- BACKGROUND MUSIC -->
<h2>🎵 Background Music</h2>
<div class="card" style="text-align:center;">
<select id="bgMusicSelect">
<option value="">No Music</option>
<option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185346/Gentle_Listening_omxjrs.mp3">Gentle Listening ☁️</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185336/Picnic_Day_cizzyf.mp3">Picnic Day 🌿</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185335/Heartbeats_Harmony_niqidb.mp3">Heartbeats Harmony 🎻</option>
  <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185327/Quiet_Romance_mzdj5b.mp3">Quiet Romance 😊</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185334/Warm_Melodies_e9ij40.mp3">Warm Melodies 🌈</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185333/Moments_in_Music_sg5vmr.mp3">Moments in Music ✨</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185330/A_Song_Between_Us_kmouli.mp3">A Song Between Us 🌙</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185329/Softly_Yours_liuxiy.mp3">Softly Yours 👨‍👩‍👧</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185329/Whispers_in_Sound_x63yxc.mp3">Whispers in Sound 💞</option>
    <option value="https://res.cloudinary.com/di8n4lsjz/video/upload/v1770185326/Slow_Music_zsow30.mp3">Slow Music 🤍</option>
</select>

<div style="margin-top:14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
<button class="btn" onclick="playMusicPreview()">▶ Preview</button>
<button class="btn ghost" onclick="stopMusicPreview()">⏹ Stop</button>
<button class="btn" onclick="saveBgMusic()">💾 Save Music</button>
</div>
<p id="musicSavedMsg" class="smallOk">Music saved ✓</p>
</div>

<!-- Upload -->
<h2>📸 Upload Media</h2>
<div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
<button class="btn" onclick="openWidget()">Cloud Upload</button>
<label class="btn ghost">
Local Upload
<input type="file" id="localFile" accept="image/*,video/*" style="display:none" onchange="uploadLocal(event)">
</label>
</div>

<h2>Media List</h2>
<div id="mediaGrid" class="grid"></div>

<div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
<button class="btn ghost" onclick="clearAll()">Delete All</button>
<button class="btn" onclick="autoSave()">Save</button>
</div>

<h3>🔑 Set Viewer Password</h3>
<div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
<input id="newPass" placeholder="simple" style="padding:10px; border-radius:12px; border:1px solid #ffd6a5;">
<button class="btn" onclick="savePass()">Save Password</button>
</div>
<p id="passSaved" class="smallOk">Password Updated ✓</p>

<h3>💬 Messages</h3>
<div style="text-align:center;">
<button id="msgOpenBtn" class="btn">Add Message</button>
</div>
<div id="allMessagesBox">(No messages yet)</div>

<div id="msgPopup">
<div class="popupInner">
<h3>Write Message</h3>
<textarea id="msgInput" placeholder="Write something joyful..."></textarea>
<button id="msgSaveBtn" class="btn" style="margin-top:12px;width:100%;">Save Message</button>
</div>
</div>

</div>

<script>
const STORAGE_KEY="simple_media";
const MSG_KEY="simple_messages";
const MUSIC_KEY="simple_music";

let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

function autoSave(){
  localStorage.setItem("simple_media", JSON.stringify(items));
}

function render(){
let box=document.getElementById("mediaGrid");
box.innerHTML="";
items.forEach((obj,i)=>{
let d=document.createElement("div");
d.className="card";

let el=document.createElement(obj.type==="video"?"video":"img");
el.src=obj.url;
if(obj.type==="video") el.controls=true;

let inp=document.createElement("input");
inp.value=obj.caption||"";
inp.placeholder="Caption...";
inp.onchange=e=>{obj.caption=e.target.value; autoSave();};

let del=document.createElement("button");
del.textContent="Delete";
del.className="btn ghost";
del.style.marginTop="10px";
del.onclick=()=>{items.splice(i,1); autoSave(); render(); };

d.appendChild(el);
d.appendChild(inp);
d.appendChild(del);
box.appendChild(d);
});
}
render();

function openWidget(){
cloudinary.openUploadWidget({
cloudName:"di8n4lsjz",
uploadPreset:"simple_delight",
folder:"simple_delight",
sources:["local","url","camera"],
multiple:true,
resourceType:"auto"
},(error,result)=>{
if(result && result.event==="success"){
items.push({
url:result.info.secure_url,
type: result.info.resource_type === "video" ? "video" : "image",
caption:""
});
autoSave();
render();

}
});
}

function uploadLocal(e){
const file=e.target.files[0];
if(!file) return;
const r=new FileReader();
r.onload=v=>{
let type=file.type.includes("video")?"video":"image";
items.push({url:v.target.result,type,caption:""});
autoSave();
render();

};
r.readAsDataURL(file);
}

function saveAll(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
function clearAll(){ items=[]; autoSave(); render(); }

function savePass(){
localStorage.setItem("viewerPassword_simpledelight", document.getElementById("newPass").value);
passSaved.style.display="block";
setTimeout(()=>passSaved.style.display="none",1500);
}

/* Messages */
function loadMessages(){
let txt=localStorage.getItem(MSG_KEY)||"";
let box=document.getElementById("allMessagesBox");
box.innerHTML="";

if(txt.trim()===""){
box.innerText="(No messages yet)";
return;
}

txt.split("\n---\n").forEach((msg,index)=>{

let div=document.createElement("div");
div.className="singleMessage";

div.innerHTML=`
<div id="msgText_${index}">${msg}</div>

<div class="msgBtns">
<button onclick="editMsg(${index})">✏️</button>
<button onclick="deleteMsg(${index})">🗑️</button>
</div>
`;

box.appendChild(div);

});
}

msgOpenBtn.onclick=()=>{msgPopup.style.display="flex";};
msgSaveBtn.onclick=()=>{
let newMsg=msgInput.value.trim();
if(!newMsg) return;
let old=localStorage.getItem(MSG_KEY)||"";
let updated=old?old+"\n---\n"+newMsg:newMsg;
localStorage.setItem(MSG_KEY,updated);
msgInput.value="";
msgPopup.style.display="none";
loadMessages();
};

function deleteMsg(index){
let txt=localStorage.getItem(MSG_KEY)||"";
let arr=txt.split("\n---\n");
arr.splice(index,1);
localStorage.setItem(MSG_KEY,arr.join("\n---\n"));
loadMessages();
}

function editMsg(index){

let txt=localStorage.getItem(MSG_KEY)||"";
let arr=txt.split("\n---\n");
let currentMsg=arr[index];
let newMsg=prompt("Edit your message:", currentMsg);
if(newMsg===null) return;
newMsg=newMsg.trim();
if(newMsg==="") return;
arr[index]=newMsg;
localStorage.setItem(MSG_KEY,arr.join("\n---\n"));
loadMessages();
}
msgPopup.onclick=e=>{ if(e.target===msgPopup) msgPopup.style.display="none"; };

/* Music */
let previewAudio=null;
const musicSelect=document.getElementById("bgMusicSelect");
const savedMusic=localStorage.getItem(MUSIC_KEY);
if(savedMusic){ musicSelect.value=savedMusic; }

function playMusicPreview(){
const url=musicSelect.value;
if(!url) return alert("Select a song first 🎵");
stopMusicPreview();
previewAudio=new Audio(url);
previewAudio.volume=0.6;
previewAudio.play();
}

function stopMusicPreview(){
if(previewAudio){
previewAudio.pause();
previewAudio.currentTime=0;
previewAudio=null;
}
}

function saveBgMusic(){
localStorage.setItem(MUSIC_KEY,musicSelect.value||"");
musicSavedMsg.style.display="block";
setTimeout(()=>musicSavedMsg.style.display="none",1500);
}
loadMessages();
</script>
<footer class="site-footer">
  <p>© 2026 CelebrateWithUs.web • Crafted with 💛</p>
</footer>
</body>
</html>
