<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultural Festive Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --ivory:#FAF3E8;
  --cream:#F5E6D3;
  --gold:#D4A017;
  --gold-light:#F2C94C;
  --gold-dark:#A67C00;
  --maroon:#7B1E2B;
  --text:#3B1F1F;
  --light-text:#FFF5E6;
}

*{
  box-sizing:border-box;
  font-family:'Libre Baskerville',serif;
}

body{
  margin:0;
  background:linear-gradient(135deg,var(--ivory),var(--cream));
  color:var(--text);
  overflow-x:hidden;
  position:relative;
}

/* Mandala glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 25%, rgba(212,160,23,0.08), transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(212,160,23,0.08), transparent 40%);
  pointer-events:none;
}

/* Lock */
#lockScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,var(--ivory),var(--cream));
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#themeSwitcher option {
  color: black;
  background: white;
}

#lockScreen h2{
  font-family:'Allura',cursive;
  font-size:3rem;
  color:var(--gold);
}

#passInput{
  padding:10px 14px;
  border-radius:20px;
  border:1px solid rgba(123,30,43,.3);
  margin-top:15px;
}

.unlockBtn{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:40px;
  background:linear-gradient(45deg,var(--gold),var(--gold-dark));
  color:white;
  cursor:pointer;
}

/* Hero */
.hero{
  padding:40px 20px 10px;
  text-align:center;
}

.title{
  font-family:'Allura',cursive;
  font-size:7rem;
  color:var(--gold);
  text-shadow:0 0 25px rgba(212,160,23,.35);
  margin-bottom: 5px;
}

.subtitle{
  letter-spacing:4px;
  font-size:14px;
  color:var(--maroon);
  text-transform:uppercase;
  margin-top: 0;
  margin-bottom: 10px;
}

/* Gallery */
.gallery{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
}

@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}

.card{
  background:var(--ivory);
  border-radius:25px;
  overflow:hidden;
  border:1px solid rgba(212,160,23,.2);
  box-shadow:0 20px 60px rgba(123,30,43,.15);
}

.card img,
.card video{
  width:100%;
  height:280px;
  object-fit:cover;
}

.caption{
  padding:15px;
  text-align:center;
  font-style:italic;
  color:var(--maroon);
}

/* Message */
.message-box{
  margin:70px 0;
  text-align:center;
}

.msg-title{
  font-family:'Allura',cursive;
  font-size:3rem;
  color:var(--gold);
  margin-bottom:25px;
}

.pink-msg-box{
  width:min(90%,900px);
  margin:auto;
  padding:40px;
  border-radius:30px;
  background:linear-gradient(145deg,var(--ivory),var(--cream));
  border:1px solid rgba(212,160,23,.2);
  box-shadow:0 25px 70px rgba(123,30,43,.12);
  line-height:1.8;
}

/* Sparkle */
.sparkle{
  position:fixed;
  width:8px;
  height:8px;
  background:radial-gradient(circle,#fff8c6,var(--gold-light),var(--gold));
  border-radius:50%;
  pointer-events:none;
  animation:fade 1s ease-out forwards;
  z-index:9999;
}

@keyframes fade{
  from{opacity:1;transform:scale(1);}
  to{opacity:0;transform:scale(.2) translateY(-10px);}
}

/* ===== MUSIC BUTTON ===== */
.musicBtn{
  position:fixed;
  top:20px;
  right:20px;
  background:linear-gradient(45deg,var(--gold),var(--gold-light));
  color:white;
  border:none;
  border-radius:50px;
  padding:10px 18px;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(212,160,23,.4);
  z-index:9998;
  transition:.3s ease;
}

.musicBtn:hover{
  transform:scale(1.08);
  box-shadow:0 14px 30px rgba(212,160,23,.6);
}

/* ===== FIREWORK BURST ===== */
.firework {
  position: fixed;
  width: 8px;
  height: 8px;
  background: var(--gold-light);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  animation: explode 900ms ease-out forwards;
}

@keyframes explode {
  0% {
    transform: scale(1) translate(0,0);
    opacity: 1;
  }
  100% {
    transform: scale(0.5) translate(var(--x), var(--y));
    opacity: 0;
  }
}

/* ===== GOLDEN CELEBRATION GLOW ===== */
.celebrationGlow {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center,
      rgba(242,201,76,0.6) 0%,
      rgba(212,160,23,0.35) 30%,
      rgba(212,160,23,0.15) 50%,
      transparent 70%);
  opacity: 0;
  pointer-events: none;
  z-index: 9998;
  animation: glowSpread 1.2s ease-out forwards;
}

@keyframes glowSpread {
  0% { opacity: 0; transform: scale(0.7); }
  40% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.2); }
}

/* Videos full width */
.videoCard{
  width:100%;
  margin-bottom:20px;
}

/* Images grid stays 2 per row */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
}

@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}

.site-footer{
  text-align:center;
  padding:20px;
  margin-top:40px;
  font-family:"Playfair Display";
  color:var(--gold);
  font-size:14px;
}
</style>
</head>

<body>

<div id="lockScreen">
  <h2>Festival Access</h2>
  <input type="password" id="passInput" placeholder="Enter password">
  <button class="unlockBtn" onclick="unlock()">Unlock</button>
</div>

<section class="hero">
  <h1 class="title">Cultural Festive</h1>
  <p class="subtitle">Festive Memories & Blessings</p>
</section>

<h2 style="
  text-align:center;
  font-family:'Allura', cursive;
  font-size:3rem;
  background:linear-gradient(45deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:30px;
  text-shadow:0 8px 25px rgba(212,160,23,.3);
">
   Golden Moments 
</h2>

<button id="musicToggle" class="musicBtn">🎵 Music</button>

<section class="gallery">
  <!-- VIDEOS -->
  <div id="videoContainer"></div>

  <!-- IMAGES -->
  <div id="imageGrid" class="grid"></div>
</section>

<section class="message-box">
  <h2 class="msg-title">Festive Blessings</h2>
  <div id="festiveMessage" class="pink-msg-box">
    No message added yet.
  </div>
</section>

<div style="
  position:fixed;
  top:70px;
  right:20px;
">
  <select id="themeSwitcher" style="
    padding:8px 14px;
    border-radius:25px;
    border:none;
    background:linear-gradient(45deg,var(--gold),var(--gold-light));
    color:white;
    cursor:pointer;
  ">
    <option value="gold">Golden</option>
    <option value="maroon">Royal Maroon</option>
    <option value="midnight">Midnight Temple</option>
  </select>
</div>
<script>

/* ===== STORAGE KEYS (must match editor) ===== */
const MEDIA_KEY = "festive_media_v1";
const MSG_KEY = "festive_message_v1";
const PASS_KEY = "festive_viewer_pass";

/* PASSWORD */
const savedPass = localStorage.getItem(PASS_KEY);

/* LOAD MEDIA */
const mediaData = JSON.parse(localStorage.getItem(MEDIA_KEY) || "[]");
const videoContainer = document.getElementById("videoContainer");
const imageGrid = document.getElementById("imageGrid");

mediaData.forEach(item=>{

  const card = document.createElement("div");
  card.className="card";

  let media;

  if(item.type === "video"){
    media = document.createElement("video");
    media.src = item.url;
    media.controls = true;

    card.classList.add("videoCard"); // full width
  }
  else{
    media = document.createElement("img");
    media.src = item.url;
  }

  const caption = document.createElement("div");
  caption.className="caption";
  caption.textContent = item.caption || "";

  card.appendChild(media);
  card.appendChild(caption);

  // Separate placement
  if(item.type === "video"){
    videoContainer.appendChild(card);
  } else {
    imageGrid.appendChild(card);
  }

});

/* LOAD MESSAGE */
const savedMsg = localStorage.getItem(MSG_KEY);
if(savedMsg && savedMsg.trim() !== ""){
  document.getElementById("festiveMessage").innerText = savedMsg;
}

/* ===== SMOOTH TRAILING CURSOR ===== */

let mouseX = 0;
let mouseY = 0;

let trailX = 0;
let trailY = 0;

const trail = document.createElement("div");
trail.style.position = "fixed";
trail.style.width = "14px";
trail.style.height = "14px";
trail.style.borderRadius = "50%";
trail.style.pointerEvents = "none";
trail.style.background = "radial-gradient(circle,#fff8c6,var(--gold-light),var(--gold))";
trail.style.boxShadow = "0 0 20px rgba(255,215,0,.9)";
trail.style.zIndex = "9999";

document.body.appendChild(trail);

document.addEventListener("mousemove", function(e){
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function updateTrailColor(theme){

  if(theme === "gold"){
    trail.style.background =
      "radial-gradient(circle,#fff8c6,var(--gold-light),var(--gold))";
    trail.style.boxShadow =
      "0 0 20px rgba(212,160,23,0.9)";
  }

  if(theme === "maroon"){
    trail.style.background =
      "radial-gradient(circle,#f8d7da,#7B1E2B,#5A1420)";
    trail.style.boxShadow =
      "0 0 20px rgba(123,30,43,0.8)";
  }

  if(theme === "midnight"){
    trail.style.background =
      "radial-gradient(circle,#ffffff,#F2C94C,#D4A017)";
    trail.style.boxShadow =
      "0 0 25px rgba(242,201,76,0.9)";
  }

}
function animateTrail(){
  trailX += mouseX;
  trailY += mouseY;

  trail.style.left = trailX - 7 + "px";
  trail.style.top = trailY - 7 + "px";

  requestAnimationFrame(animateTrail);
}

animateTrail();




/* =========================
   CLEAN AUTO MUSIC SYSTEM
========================= */

const MUSIC_KEY = "gm_bg_music";
const musicUrl = localStorage.getItem(MUSIC_KEY);

let bgAudio = null;
let isPlaying = false;

if(musicUrl){
  bgAudio = new Audio(musicUrl);
  bgAudio.loop = true;
  bgAudio.volume = 0.6;
}

function startMusic(){
  if(bgAudio && !isPlaying){
    bgAudio.play().then(()=>{
      isPlaying = true;
      document.getElementById("musicToggle").innerText = "⏸ Pause";
    }).catch(()=>{});
  }
}

document.getElementById("musicToggle").addEventListener("click", function(){

  if(!bgAudio){
    alert("No music selected in editor 🎵");
    return;
  }

  if(!isPlaying){
    bgAudio.play();
    this.innerText = "⏸ Pause";
    isPlaying = true;
  } else {
    bgAudio.pause();
    this.innerText = "🎵 Music";
    isPlaying = false;
  }

});

function launchFireworks() {

  const count = 25;

  for (let i = 0; i < count; i++) {
    const particle = document.createElement("div");
    particle.className = "firework";

    const angle = Math.random() * 2 * Math.PI;
    const distance = 80 + Math.random() * 150;

    const x = Math.cos(angle) * distance + "px";
    const y = Math.sin(angle) * distance + "px";

    particle.style.left = Math.random() * window.innerWidth + "px";
    particle.style.top = Math.random() * window.innerHeight + "px";
    particle.style.setProperty("--x", x);
    particle.style.setProperty("--y", y);

    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 900);
  }

  
}
let fireworkInterval = null;

function startContinuousFireworks(){
  if(!fireworkInterval){
    fireworkInterval = setInterval(() => {
      launchFireworks();
    }, 1400);
  }
}

const themeSelect = document.getElementById("themeSwitcher");
const messageBox = document.getElementById("festiveMessage");
const subtitle = document.querySelector(".subtitle");
const captions = document.querySelectorAll(".caption");
themeSelect.addEventListener("change", function(){

  const theme = this.value;
  updateTrailColor(theme);

  if(theme === "gold"){
    document.documentElement.style.setProperty('--ivory','#FAF3E8');
    document.documentElement.style.setProperty('--cream','#F5E6D3');
    document.documentElement.style.setProperty('--gold','#D4A017');
    messageBox.style.color = "var(--text)";
    subtitle.style.color = "var(--maroon)";
     captions.forEach(cap => {
    cap.style.color = "var(--maroon)";
  });
  }

  if(theme === "maroon"){
    document.documentElement.style.setProperty('--ivory','#FDF2F4');
    document.documentElement.style.setProperty('--cream','#F9E3E8');
    document.documentElement.style.setProperty('--gold','#7B1E2B');
    messageBox.style.color = "var(--text)";
     subtitle.style.color = "var(--white)";
     captions.forEach(cap => {
    cap.style.color = "var(--maroon)";
  });
  }

  if(theme === "midnight"){
  document.documentElement.style.setProperty('--ivory','#1E1B2E');
  document.documentElement.style.setProperty('--cream','#2A243F');
  document.documentElement.style.setProperty('--gold','#F2C94C');

  messageBox.style.color = "#F2C94C";
  subtitle.style.color = "white";

  captions.forEach(cap => {
    cap.style.color = "white";   // 🔥 captions white
  });
}
});


function unlock(){
  const input = document.getElementById("passInput").value;

  if(!savedPass || input === savedPass){
    document.getElementById("lockScreen").style.display="none";

    launchFireworks();          // first big burst
    startContinuousFireworks(); // background celebration

    setTimeout(() => {
      startMusic();
    }, 900);
  }
}
</script>
<!-- FOOTER -->
<footer class="site-footer">
  <p>© 2026 CelebrateWithUs.web • Crafted with 💛</p>
</footer>
</body>
</html>
