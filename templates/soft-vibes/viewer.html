<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Vibes • Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Quicksand:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{

/* 🌌 Background Colors */
--bg-main:#F2E3DA;
--bg-card:#F6EDE7;
--bg-panel:#FFF7F1;

/* 🖋 Text */
--text:#5A3A2A;
--text-soft:#7A5640;

/* ✨ Accent */
--accent:#C48A5A;
--accent-btn:#C48A5A;
--accent-hover:#D8A676;

/* 🌿 UI */
--input:#E6D7CC;
--button-soft:#D8C2B4;

/* 📸 Frames */
--frame:#FFF7F1;
--frame-border:#EAD7CC;
--frame-shadow:rgba(0,0,0,0.08);

/* 🌟 Decorative */
--gold:#D8A676;
--peach:#F1C7A8;
--petal:#EAD7CC;

/* ✨ Confetti palette */
--confetti-rose:#F1C7A8;
--confetti-gold:#D8A676;
--confetti-peach:#E8B79C;
--confetti-cream:#F9F3EE;

}

body{
margin:0;
font-family:"Quicksand",sans-serif;
background:var(--bg-main);
color:var(--text);
}

/* 🌸 dreamy glow */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(241,199,168,.35), transparent 60%),
radial-gradient(circle at 80% 30%, rgba(216,166,118,.25), transparent 60%),
radial-gradient(circle at 50% 85%, rgba(234,215,204,.35), transparent 60%);
z-index:-1;
}

.page{
max-width:1100px;
margin:auto;
padding:30px 20px 80px;
}

header{
margin-top:30px;
background:var(--bg-card);
padding:30px;
border-radius:28px;
text-align:center;
box-shadow:0 14px 32px rgba(0,0,0,.08);
}

header h1{
font-family:"Baloo 2",cursive;
font-size:56px;
margin:0;
color:var(--accent);
}

header p{
margin-top:0;
opacity:.8;
color:var(--text-soft);
}

section{
margin-top:30px;
background:var(--bg-panel);
padding:25px;
border-radius:28px;
box-shadow:0 14px 32px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* 📸 Polaroid */
.polaroid{
background:var(--frame);
border-radius:18px;
padding:14px;
text-align:center;
border:2px solid var(--frame-border);
box-shadow:0 8px 16px var(--frame-shadow);
transition:.3s ease;
}

.polaroid:hover{
transform:translateY(-8px) rotate(-1deg);
}

.polaroid img,
.polaroid video{
width:100%;
border-radius:14px;
}

.caption{
margin-top:10px;
font-size:.85rem;
opacity:.8;
}

/* 🌸 Section titles */
section h3{
font-family:'Great Vibes',cursive;
font-size:42px;
font-weight:normal;
letter-spacing:1px;
color:#8A5A3B;
text-align:center;
text-shadow:0 6px 18px rgba(216,166,118,.35);
}

/* 🎵 Music button */
#musicToggle{
position:fixed;
top:16px;
right:16px;
z-index:999;
width:45px;
height:45px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,var(--accent-btn),var(--accent-hover));
cursor:pointer;
font-size:18px;
color:white;
}

/* 🔒 Lock Screen */
#lockScreen{
position:fixed;
inset:0;
background:var(--bg-main);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.lockBox{
background:var(--bg-panel);
padding:34px;
border-radius:28px;
text-align:center;
width:320px;
box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.lockBox h2{
font-family:"Baloo 2";
color:var(--accent);
}

.lockBox input{
width:100%;
padding:12px;
border-radius:999px;
border:2px solid var(--accent-hover);
margin-top:12px;
background:#ffffff;
outline:none;
font-family:"Quicksand";
}

.lockBox button{
margin-top:14px;
padding:10px 20px;
border-radius:999px;
border:none;
background:linear-gradient(135deg,var(--accent-btn),var(--accent-hover));
color:white;
font-weight:600;
cursor:pointer;
transition:.2s ease;
}

.lockBox button:hover{
transform:scale(1.05);
}

/* 💬 Messages */
#messages div{
background:#F9F3EE;
padding:12px;
border-radius:16px;
margin-bottom:10px;
}

/* ✨ Lightbox */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s ease;
}

.lightbox.open{
opacity:1;
pointer-events:all;
}

.lightbox-inner{
background:white;
padding:20px;
border-radius:22px;
max-width:80%;
}

.lightbox img{
max-width:100%;
border-radius:16px;
}

/* 🎈 Balloons */
.balloon{
position:absolute;
width:60px;
height:85px;
border-radius:50% 50% 45% 45%;
animation:floatBalloon 5s ease-in-out infinite;
cursor:pointer;
background:#F1C7A8;
}

.balloon::after{
content:"";
position:absolute;
top:85px;
left:50%;
width:2px;
height:40px;
background:rgba(120,90,70,.4);
transform:translateX(-50%);
}

@keyframes floatBalloon{
0%,100%{ transform:translateY(0); }
50%{ transform:translateY(-30px); }
}

/* ✨ Cursor trail */
.trail{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
animation:trailFade .7s ease forwards;
box-shadow:0 0 12px rgba(216,166,118,.6);
z-index:99999;
}

@keyframes trailFade{
to{
opacity:0;
transform:scale(0.2);
}
}

/* MUSIC BUTTON */
#musicToggle{
  position:fixed;
  top:16px;
  right:16px;
  z-index:999;
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,var(--accent-btn),var(--accent-hover));
  cursor:pointer;
  font-size:18px;
}


/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
}
.lightbox.open{
  opacity:1;
  pointer-events:all;

}
.lightbox-inner{
  background:white;
  padding:20px;
  border-radius:22px;
  max-width:80%;
}
.lightbox img{
  max-width:100%;
  border-radius:16px;
}

.timeline-card{
position:relative;
margin-top:30px;
background:var(--bg-panel);
padding:25px;
border-radius:28px;
box-shadow:0 14px 32px rgba(0,0,0,.08);
}

.timeline-track{
position:relative;
height:10px;
border-radius:999px;

background:linear-gradient(
90deg,
#E6A94B,
#C8752E,
#8B4A2B
);
}

.timeline-track-wrap{
  position:relative;
}

.timeline-track{
  position:relative;
  height:8px;
  border-radius:999px;
  background:linear-gradient(
    90deg,
    #D8A676,
    #C48A5A
  );
}

.timeline-indicator{
position:absolute;
top:50%;
left:0%;
transform:translate(-50%,-50%);

width:26px;
height:26px;
border-radius:50%;

background:radial-gradient(
circle,
#ffffff,
#E6A94B,
#C8752E
);

box-shadow:0 0 22px rgba(212,139,58,.9);

transition:.6s cubic-bezier(.4,0,.2,1);
}

.timeline-items{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.timeline-card::before{
display:none;
}

.timeline-item{
cursor:pointer;
font-size:15px;
opacity:.6;
color:#5B3726;
transition:.3s ease;
}

.timeline-item.active{
opacity:1;
font-weight:600;
color:#D48B3A;
transform:scale(1.05);
}

body.sunrise{
background:linear-gradient(180deg,#FFF3E8,#F2E3DA);
}

body.morning{
background:linear-gradient(180deg,#FFE8D6,#F6EDE7);
}

body.golden{
background:linear-gradient(180deg,#F1C7A8,#F2E3DA);
}

body.sunset{
background:linear-gradient(180deg,#E8CFC0,#F2E3DA);
}

.timeline-indicator{
animation:softGlow 2s infinite alternate;
}

@keyframes softGlow{
from{ box-shadow:0 0 10px rgba(216,166,118,.5); }
to{ box-shadow:0 0 25px rgba(216,166,118,.9); }
}

.videoBox{
  width:100%;
  margin-bottom:25px;
}

.videoBox video{
  width:100%;
  aspect-ratio:16/9;
  border-radius:18px;
  object-fit:cover;
}

.site-footer{
  text-align:center;
  margin-top:40px;
  padding:18px;
  font-size:14px;
  color:#5A3A2A;
  font-family:"Quicksand";
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lockBox">
    <h2 style="font-family:'Baloo 2';color:#e76f51;">Soft Vibes</h2>
    <p>Enter password to unlock ☀️</p>
    <input id="passInput" type="password" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
  </div>
</div>

<button id="musicToggle">▶️</button>
<audio id="bgMusic" loop></audio>

<div id="viewerPage" style="display:none;">
<div class="page">

<header>
  <h1>Soft Vibes</h1>
  <p>Confetti of happy memories.</p>
</header>

<section>
  <h3>Moments in Blooms</h3>
  <div id="videoContainer"></div>
<div id="gallery" class="grid"></div>
</section>

<section class="timeline-card" id="timelineSection">
 <h3>Moments Through the Day</h3>
  <div class="timeline-track-wrap">
    <div class="timeline-track">
      <div class="timeline-indicator" id="timelineDot"></div>
    </div>
  </div>

  <div class="timeline-items" id="timelineItems"></div>
</section>

<section>
  <h3> Floating Joy Balloons</h3>
  <div id="balloonsArea" style="position:relative;
  height:120px;
  margin-top:-10px;">
  </div>
</section>

<section>
  <h3>Notes from the Heart</h3>
  <div id="messages"></div>
</section>

</div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <img id="lightboxImg">
    <p id="lightboxCap"></p>
  </div>
</div>

<script>
const MEDIA_KEY="soft_media";
const MSG_KEY="soft_messages";
const MUSIC_KEY="soft_music";
const PASS_KEY="viewerPassword_softvibes";
const musicToggle = document.getElementById("musicToggle");

let isPlaying=false;

/* PASSWORD */
function checkPassword(){

const savedPassword = localStorage.getItem("viewerPassword_softvibes");
const enteredPassword = document.getElementById("passInput").value.trim();

if(!savedPassword){
alert("Password not set yet. Please set it in the editor.");
return;
}

if(enteredPassword !== savedPassword){
alert("Wrong password ❌");
return;
}

document.getElementById("lockScreen").style.display="none";
document.getElementById("viewerPage").style.display="block";

loadGallery();
loadMessages();
loadMusic();

}

/* GALLERY */
function loadGallery(){
  const items = JSON.parse(localStorage.getItem("soft_media") || "[]");

  const videoContainer = document.getElementById("videoContainer");
  const gallery = document.getElementById("gallery");

  videoContainer.innerHTML = "";
  gallery.innerHTML = "";

  if(!items.length){
    gallery.innerHTML = "<p>No memories yet 🌼</p>";
    return;
  }

  // ✅ VIDEOS (FULL ROW)
  items.forEach(item=>{
    if(item.type === "video"){
      videoContainer.innerHTML += `
        <div class="videoBox">
          <video src="${item.url}" controls></video>
          <p class="caption">${item.caption || ""}</p>
        </div>
      `;
    }
  });

  // ✅ IMAGES (GRID)
  items.forEach((item,i)=>{
    if(item.type === "image"){
      const card=document.createElement("div");
      card.className="polaroid";

      const img=document.createElement("img");
      img.src=item.url;

      const cap=document.createElement("div");
      cap.className="caption";
      cap.textContent=item.caption || "";

      img.onclick=()=>{
        lightbox.classList.add("open");
        lightboxImg.src=item.url;
        lightboxCap.textContent=item.caption || "";
      };

      card.appendChild(img);
      card.appendChild(cap);
      gallery.appendChild(card);
    }
  });
}

lightbox.onclick=()=>lightbox.classList.remove("open");

/* MESSAGES */
function loadMessages(){
  const raw=localStorage.getItem(MSG_KEY);
  const box=document.getElementById("messages");

  if(!raw){
    box.innerHTML="<p>No messages yet 💛</p>";
    return;
  }

  raw.split("\n---\n").forEach(msg=>{
    const div=document.createElement("div");
    div.style.background="#fff3d6";
    div.style.padding="12px";
    div.style.borderRadius="16px";
    div.style.marginBottom="10px";
    div.textContent=msg;
    box.appendChild(div);
  });
}

/* MUSIC */
function loadMusic(){
  const url=localStorage.getItem(MUSIC_KEY);
  const audio=document.getElementById("bgMusic");
  if(url){
    audio.src=url;
    audio.volume=0.6;
    audio.play();
    musicToggle.textContent="⏸";
    isPlaying=true;
  }
}

musicToggle.onclick=()=>{
  const audio=document.getElementById("bgMusic");

  if(!audio.src){
    alert("No music selected in editor 🎵");
    return;
  }

  if(audio.paused){
    audio.play();
    musicToggle.textContent="⏸";
  }else{
    audio.pause();
    musicToggle.textContent="▶️";
  }
};

/* 🌈 SKY AUTO TIME CHANGE */
function setSkyByTime(){
  const hour = new Date().getHours();
  document.body.classList.remove("sunrise","morning","golden","sunset");

  if(hour < 10) document.body.classList.add("sunrise");
  else if(hour < 15) document.body.classList.add("morning");
  else if(hour < 18) document.body.classList.add("golden");
  else document.body.classList.add("sunset");
}

/* ☀️ Add Sun Rays */
const sun = document.createElement("div");
sun.className="sun-rays";
document.body.appendChild(sun);

/* 🎈 Spawn Balloons */
function spawnBalloons(){
  const area=document.getElementById("balloonsArea");
  if(!area) return;

  const colors=["#ffe08a","#ff9a9a","#ffccb3","#ffd6ff"];
  for(let i=0;i<6;i++){
    const b=document.createElement("div");
    b.className="balloon";
    b.style.left=(i*15+10)+"%";
    b.style.bottom="20px";
    b.style.background=colors[i%colors.length];
    b.onclick=()=>b.remove();
    area.appendChild(b);
  }
}

/* ✨ Confetti Burst */
function confettiBurst(){
  const colors=["#E55B3C","#F4C542","#6FB6C8","#7DB6A4","#F2A07C"];
  for(let i=0;i<80;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.top="0px";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1200);
  }
}

/* ✨ Simple Delight Cursor Trail */
const delightColors=[
"#D8A676",  // soft gold
"#F1C7A8",  // peach glow
"#C48A5A",  // caramel
"#EAD7CC",  // petal dust
"#B47A4B"   // bronze
];

let trailIndex=0;

document.addEventListener("mousemove",e=>{

  const sparkle=document.createElement("div");
  sparkle.className="trail";

  sparkle.style.left=e.clientX+"px";
  sparkle.style.top=e.clientY+"px";

  sparkle.style.background=
    delightColors[trailIndex % delightColors.length];

  sparkle.style.width="8px";
  sparkle.style.height="8px";
  sparkle.style.borderRadius="50%";

  trailIndex++;

  document.body.appendChild(sparkle);

  setTimeout(()=>sparkle.remove(),600);

});

/* 🔓 Enhance Unlock */
const oldUnlock = checkPassword;
checkPassword = function(){
  oldUnlock();
  if(document.getElementById("viewerPage").style.display==="block"){
    setSkyByTime();
    spawnBalloons();
    confettiBurst();
  }
};
const timelineStages = [
  { label:"soft sunrise peach", pos:"0%", theme:"sunrise" },
  { label:"warm pastel", pos:"33%", theme:"morning" },
  { label:"golden glow", pos:"66%", theme:"golden" },
  { label:"soft dusk tone", pos:"100%", theme:"sunset" }
];

const timelineItems = document.getElementById("timelineItems");
const timelineDot = document.getElementById("timelineDot");
const timelineCard = document.querySelector(".timeline-card");
const allSections = document.querySelectorAll("section");

timelineStages.forEach((stage,i)=>{
  const div = document.createElement("div");
  div.className = "timeline-item";
  div.textContent = stage.label;

  if(i===0) div.classList.add("active");

  div.onclick = ()=>{
  document.querySelectorAll(".timeline-item")
    .forEach(el=>el.classList.remove("active"));

  div.classList.add("active");

  timelineDot.style.left = stage.pos;
  confettiBurst();

  applyTheme(stage.theme);   // ← this changes the background
  updateTimelineColor(stage.theme);
  
};

  timelineItems.appendChild(div);
});

function applyTheme(theme){
  document.body.classList.remove(
    "sunrise",
    "morning",
    "golden",
    "sunset"
  );
  document.body.className = theme;
}

function updateTimelineColor(theme){

let sectionColor;
let trackColor;

if(theme==="sunrise"){
trackColor="linear-gradient(90deg,#F1C7A8,#D8A676)";
sectionColor="linear-gradient(135deg,#FFF3E8,#F2E3DA)";
}

if(theme==="morning"){
trackColor="linear-gradient(90deg,#F1C7A8,#C48A5A)";
sectionColor="linear-gradient(135deg,#FFE8D6,#F6EDE7)";
}

if(theme==="golden"){
trackColor="linear-gradient(90deg,#D8A676,#C48A5A)";
sectionColor="linear-gradient(135deg,#F1C7A8,#F2E3DA)";
}

if(theme==="sunset"){
trackColor="linear-gradient(90deg,#B47A4B,#8A5A3B)";
sectionColor="linear-gradient(135deg,#E8CFC0,#F2E3DA)";
}

timelineTrack.style.background = trackColor;

/* change ALL boxes */
allSections.forEach(section=>{
section.style.background = sectionColor;
});

}

</script>
<footer class="site-footer">
  <p>© 2026 CelebrateWithUs.web • Crafted with 💛</p>
</footer>
</body>
</html>
