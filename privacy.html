<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Privacy Policy</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Styling -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #fff6fb, #ffeef6);
      color: #333;
      padding: 40px 20px;
      margin: 0;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(255, 182, 210, 0.2);
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: #ff6fa5;
      margin-bottom: 20px;
    }

    p {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
    }

    a {
      color: #ff6fa5;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>

</head>
<body>

    <div class="container">
  <h1>Privacy Policy</h1>

  <p>We collect basic user information such as name, email, and payment details for service delivery.</p>

  <p>Your data is not sold or shared with third parties.</p>

  <p>All transactions are processed securely through payment gateways.</p>
  </div>
</body>
</html>
